name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs: 
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/Checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with: 
          python-version: '3.11'
          cache: pip

      - name: Install Dependencies
        run: | 
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txtgit statu