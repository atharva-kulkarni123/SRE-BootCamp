name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs: 
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/Checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with: 
          python-version: '3.11'
          cache: pip

      - name: Install Dependencies
        run: | 
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Run tests
        run: |
          pip install pytest black
          pytest ./app/test_main.py
      
      - name: Lint with flake8
        run:
          black .
      
            # ── Stage 6: Node setup for semantic-release ────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
 
      - name: Install semantic-release dependencies
        run: npm ci    # reads package-lock.json — faster and deterministic than npm install
 
      # ── Stage 7: Semantic Release ───────────────────────────────
      - name: Semantic Release
        id: semantic
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
 
      # ── Stage 8: Docker Login ───────────────────────────────────
      - name: Docker Login
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
 
      # ── Stage 9: Docker Build & Push ────────────────────────────
      - name: Build Docker Image
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/students-api:${{ steps.semantic.outputs.new_release_version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/students-api:latest