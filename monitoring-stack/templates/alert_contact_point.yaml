apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-contact-points
  namespace: monitoring
  labels:
    grafana_alert: "1"
data:
  contact-points.yaml: |
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: email-alerts
        receivers:
          - uid: email-receiver
            type: email
            settings:
              addresses: atharvakulkarni1926@gmail.com   # ← replace with your email
              singleEmail: false
            disableResolveMessage: false