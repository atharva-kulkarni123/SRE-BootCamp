kube-prometheus-stack:
  grafana:
    enabled: true
    nodeSelector:
      app: monitoring

    adminPassword: admin

    grafana.ini:
    smtp:
      enabled: true
      host: smtp.gmail.com:587
      user: your-email@gmail.com
      password: your-app-password       # use Gmail App Password, not your real password
      from_address: your-email@gmail.com
      from_name: Grafana Alerts
      startTLS_policy: MandatoryStartTLS

    service:
      type: NodePort
      nodePort: 32000

  prometheus:
    enabled: true

    prometheusSpec:
      nodeSelector:
        app: monitoring

  alertmanager:
    enabled: false

    alertmanagerSpec:
      nodeSelector:
        app: monitoring

  kube-state-metrics:
    nodeSelector:
      app: monitoring

  prometheus-node-exporter:
    nodeSelector:
      app: monitoring

  prometheusOperator:
    nodeSelector:
      app: monitoring